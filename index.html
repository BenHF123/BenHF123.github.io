<!DOCTYPE html>
<html lang="no">
<head>

  <title>Benjamin Holsen Fidjeland</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* Sticky Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: white;
    }

    .header img {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      display: block;
    }

    /* Buttons on header */
    .nav-buttons {
      position: absolute;
      top: 20px;
      right: 30px;
    }

    .nav-buttons a {
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 10px 15px;
      margin-left: 10px;
      text-decoration: none;
      border-radius: 5px;
    }

    .nav-buttons a:hover {
      background: rgba(0,0,0,0.8);
    }

    /* Sections */
    section {
      padding: 80px 20px;
      text-align: center;
    }

    iframe {
      max-width: 90%;
    }

    /* Smooth scroll */
    html {
      scroll-behavior: smooth;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <img src="github-header-banner.png" alt="Header Banner">

    <div class="nav-buttons">
      <a href="#video">Video</a>
      <a href="#om-meg">Om Meg</a>
      <a href="#kontakt">Kontakt</a>
    </div>
  </div>

    <iframe width="560" height="315"
