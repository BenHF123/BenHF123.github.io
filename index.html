<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benjamin Holsen Fidjeland</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* Sticky Header Banner */
    .header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: #000;
    }

    .header img {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      display: block;
    }

    /* Navigation Buttons on Banner */
    .nav-buttons {
      position: absolute;
      top: 20px;
      right: 30px;
    }

    .nav-buttons a {
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 10px 15px;
      margin-left: 10px;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }

    .nav-buttons a:hover {
      background: rgba(255,255,255,0.2);
    }

    /* Sections */
    section {
      padding: 60px 20px;
      text-align: center;
    }

    iframe {
      max-width: 90%;
    }

    .links img {
      width: 150px;
      margin: 10px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .links img:hover {
      transform: scale(1.1);
    }

  </style>
</head>
<body>

  <!-- Sticky Header Banner with Navigation -->
  <div class="header">
    <img src="github-header-banner.png" alt="Header Banner">
    <div class="nav-buttons">
      <a href="index.html">Video</a>
      <a href="about.html">Om Meg</a>
      <a href="contact.html">Kontakt</a>
    </div>
  </div>

  <!-- Video Section (Main Page) -->
  <section>
    <h2>Video</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/YOUR_VIDEO_ID" frameborder="0" allowfullscreen></iframe>
  </section>

</body>
</html>
